name: Daily Currency Scrape

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Install Wrangler CLI
        run: npm install -g wrangler

      - name: Scrape each provider and checkpoint to D1
        shell: bash
        run: |
          set +e
          set +o pipefail
          
          providers=("Wise" "Remitly" "WorldRemit" "Western Union" "Xoom" "MoneyGram" "Taptap Send" "Ria" "Panda Remit" "Sendwave" "TransferGo")
          failed=()
          
          for provider in "${providers[@]}"; do
            slug=$(echo "$provider" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/^-//;s/-$//')
            outdir="output/$slug"
            
            echo ""
            echo "::group::▶️ $provider"
            echo "Output will be at: $outdir"
            
            # Run scraper with a 15-minute safety timeout per provider
            timeout 900 node src/index.js --provider="$provider"
            
            # Check if the scraper produced a rates.json file
            
            if [ -f "$outdir/rates.json" ] || [ -f "$outdir/rates.ndjson" ]; then
            
              echo "✅ $provider finished — generating SQL"
              node scripts/generate-sql.js "$provider"
              
              if [ -f "./output/insert-rates.sql" ]; then
                echo "📤 Pushing $provider to D1..."
                wrangler d1 execute currency-rates --remote --file=./output/insert-rates.sql
                d1_exit=$?
                if [ $d1_exit -eq 0 ]; then
                  echo "✅ $provider saved to D1"
                else
                  echo "⚠️ D1 push failed for $provider (exit $d1_exit)"
                  failed+=("$provider (D1)")
                fi
              else
                echo "⚠️ SQL file not generated for $provider"
                failed+=("$provider (SQL)")
              fi
            else
              echo "❌ $provider failed or timed out — no $outdir/rates.json found"
              failed+=("$provider")
            fi
            
            echo "::endgroup::"
          done
          
          echo ""
          echo "========== SUMMARY =========="
          echo "Providers attempted: ${#providers[@]}"
          echo "Failed: ${#failed[@]}"
          
          if [ ${#failed[@]} -gt 0 ]; then
            echo "Failed: ${failed[*]}"
            echo "::warning::${#failed[@]} provider(s) failed, but successful ones are already in D1"
            exit 1
          else
            echo "All providers succeeded"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
