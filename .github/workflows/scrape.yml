name: Daily Currency Scrape

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Install Wrangler CLI
        run: npm install -g wrangler

      - name: Scrape providers incrementally and push to D1
        run: |
          declare -a providers=("Wise" "Remitly" "WorldRemit" "Western Union" "Xoom" "MoneyGram" "Taptap Send" "Ria" "Panda Remit" "Sendwave" "TransferGo")
          failed=()
          
          for provider in "${providers[@]}"; do
            echo "::group::▶️ $provider"
            
            if node src/index.js --provider="$provider"; then
              echo "✅ $provider scraped successfully — pushing to D1"
              node scripts/generate-sql.js "$provider"
              wrangler d1 execute currency-rates --remote --file=./output/insert-rates.sql
            else
              echo "❌ $provider failed — continuing to next provider"
              failed+=("$provider")
            fi
            
            echo "::endgroup::"
          done
          
          echo ""
          echo "========== SUMMARY =========="
          echo "Total providers: ${#providers[@]}"
          echo "Failed: ${#failed[@]}"
          
          if [ ${#failed[@]} -gt 0 ]; then
            echo "Failed providers: ${failed[*]}"
            echo "::warning::${#failed[@]} provider(s) failed but successful ones are already in D1"
            exit 1  # Fail the workflow so GitHub notifies you, but DB already has the good data
          else
            echo "All providers succeeded"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
